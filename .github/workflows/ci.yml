name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeroroute-web
    steps:
      - uses: actions/checkout@v4
        with:
          path: aeroroute-web
      - uses: actions/checkout@v4
        with:
          repository: jmiguelmangas/aeroroute-contracts
          path: aeroroute-contracts
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: aeroroute-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm check
      - run: pnpm e2e
